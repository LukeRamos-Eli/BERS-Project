<!DOCTYPE html>
<html>
<head>
    <title>BERS Emergency Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
        }

        .info-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            font-size: 14px;
            font-family: Arial, sans-serif;
            pointer-events: none;
        }

            .info-box strong {
                color: #d32f2f;
            }

        .instruction {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 12px;
            font-family: Arial, sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="instruction">
        📍 Click on map to mark emergency location
    </div>
    <div class="info-box" id="infoBox">
        <strong>Emergency Location Picker</strong><br>
        Click anywhere on the map to select your location
    </div>

    <script>
        // Initialize map centered on Philippines
        var map = L.map('map').setView([14.5995, 120.9842], 13);

        // Use CARTO tile server (free, no referer needed)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Variable to store the marker
        var selectedMarker = null;

        // Function to update info box with coordinates
        function updateInfoBox(lat, lng) {
            var infoBox = document.getElementById('infoBox');
            infoBox.innerHTML = '<strong>📍 Selected Location</strong><br>' +
                'Latitude: ' + lat.toFixed(6) + '<br>' +
                'Longitude: ' + lng.toFixed(6) + '<br>' +
                '✓ Location saved. Click "Confirm" to proceed.';
        }

        // Handle map click
        map.on('click', function (e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            // Remove existing marker if any
            if (selectedMarker) {
                map.removeLayer(selectedMarker);
            }

            // Add new marker
            selectedMarker = L.marker([lat, lng]).addTo(map);

            // Add popup
            selectedMarker.bindPopup('Emergency Location').openPopup();

            // Update info box
            updateInfoBox(lat, lng);

            // Send coordinates to C# WinForms
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(JSON.stringify({
                    type: 'location',
                    latitude: lat,
                    longitude: lng
                }));
            }
        });

        // Double-click to zoom in
        map.on('dblclick', function (e) {
            map.setView(e.latlng, map.getZoom() + 1);
        });

        // Get user's current location
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;

                    if (selectedMarker) {
                        map.removeLayer(selectedMarker);
                    }

                    selectedMarker = L.marker([lat, lng]).addTo(map);
                    map.setView([lat, lng], 16);
                    selectedMarker.bindPopup('Emergency Location').openPopup();
                    updateInfoBox(lat, lng);

                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage(JSON.stringify({
                            type: 'location',
                            latitude: lat,
                            longitude: lng
                        }));
                    }
                }, function (error) {
                    alert('Error getting location: ' + error.message);
                });
            } else {
                alert('Geolocation is not supported by this browser.');
            }
        }
    </script>
</body>
</html>
